# ------------------------------------------------------------------------------
# ATAJOS DE TECLADO (Keybinds)
# ------------------------------------------------------------------------------
$mainMod = SUPER # Tecla Windows / Super

#a modo de tener en cuenta. para lo que sean programas se usa alt, y para lo que sea cosas de movilidad ventanas y sheell se usa mainMod.

#---------------------------  Aplicaciones Generales  --------------------------
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, W, killactive, 
bind = $mainMod SHIFT, M, exit, 
bind = $mainMod, V, togglefloating
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo
bind = $mainMod, T, layoutmsg, togglesplit
bind = $mainMod, F, fullscreen, 0



# Aplicaciones
bind = ALT, L, exec, loginctl lock-session # Bloquear pantalla
bind = ALT, B, exec, ~/.config/hypr/scripts/change_wallpaper.sh # Cambiar fondo de pantalla
bind = ALT, E, exec, $fileManager
bind = ALT, F, exec, firefox

#---------------------------  fin  de  Aplicaciones y  Bloqueo ---------------------------

bind = , PRINT, exec, hyprshot -m output # Capturar todo
bind = $mainMod, PRINT, exec, hyprshot -m window # Capturar ventana
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m region # Capturar región

# Controles de hardware (Volumen y Brillo) - Requiere pipewire y brightnessctl
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Mover el foco entre ventanas con mainMod + hjkl (o flechas)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Redimensionar ventanas con mainMod + SHIFT + hjkl
binde = $mainMod SHIFT, h, resizeactive, -20 0
binde = $mainMod SHIFT, l, resizeactive, 20 0
binde = $mainMod SHIFT, k, resizeactive, 0 -20
binde = $mainMod SHIFT, j, resizeactive, 0 20

# Mover la ventana activa en el layout con mainMod + ALT + hjkl
bind = $mainMod ALT, h, movewindow, l
bind = $mainMod ALT, l, movewindow, r
bind = $mainMod ALT, k, movewindow, u
bind = $mainMod ALT, j, movewindow, d

# Navegar rápidamente entre workspaces con mainMod + CTRL + hjkl/flechas
bind = $mainMod CTRL, l, workspace, e+1
bind = $mainMod CTRL, h, workspace, e-1
bind = $mainMod CTRL, right, workspace, e+1
bind = $mainMod CTRL, left, workspace, e-1

# Cambiar entre espacios de trabajo (Workspaces)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover la ventana activa a un espacio de trabajo
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll a través de workspaces existentes con ratón (mainMod + scroll)
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mover y redimensionar ventanas con el ratón
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
