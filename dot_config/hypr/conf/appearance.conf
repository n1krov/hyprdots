# ------------------------------------------------------------------------------
# ASPECTO Y APARIENCIA (General & Decoration)
# ------------------------------------------------------------------------------
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    
    # Colores de bordes (activo e inactivo)
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
    
    # Evita que el ratón cambie de ventana si no se hace clic
    # focus_to_other_workspaces = true
}

decoration {
    rounding = 10

    # Opacidad
    active_opacity = 1.0
    inactive_opacity = 0.9

    # Sombra (Configuración actualizada para Hyprland reciente)
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # Blur
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

# ------------------------------------------------------------------------------
# ANIMACIONES
# ------------------------------------------------------------------------------
animations {
    enabled = true

    # Curva de animación suave
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# ------------------------------------------------------------------------------
# LAYOUTS Y DISPOSICIÓN
# ------------------------------------------------------------------------------
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    # new_is_master = true # Comentado porque fue deprecado en versiones nuevas, revisar si es necesario
    new_status = master
}
